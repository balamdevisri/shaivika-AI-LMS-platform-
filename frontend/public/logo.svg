<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the exact logo colors -->
    <linearGradient id="topToLeft" x1="80" y1="40" x2="35" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>

    <linearGradient id="leftToBottom" x1="35" y1="115" x2="80" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0072FF"/>
      <stop offset="100%" stop-color="#8E2DE2"/>
    </linearGradient>

    <linearGradient id="leftToRight" x1="35" y1="115" x2="135" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0072FF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>

    <linearGradient id="cyanNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#00A8FF"/>
    </linearGradient>

    <linearGradient id="blueNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0080FF"/>
      <stop offset="100%" stop-color="#0055FF"/>
    </linearGradient>

    <linearGradient id="purpleNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D34DA"/>
      <stop offset="100%" stop-color="#6B11B0"/>
    </linearGradient>
  </defs>

  <!-- Connected Bridges (Metaball organic shapes) -->
  <g>
    <!-- Bridge: Top to Left -->
    <path d="M 60 25 C 45 45, 18 90, 18 105 C 32 125, 60 70, 95 55 Z" fill="url(#topToLeft)" />

    <!-- Bridge: Left to Bottom -->
    <path d="M 18 120 C 18 135, 55 180, 70 195 C 95 180, 48 130, 48 105 Z" fill="url(#leftToBottom)" />

    <!-- Bridge: Left to Right -->
    <path d="M 35 93 L 135 93 L 135 137 L 35 137 Z" fill="url(#leftToRight)" />

    <!-- Nodes (Circles) -->
    <!-- Top Node (Cyan) -->
    <circle cx="80" cy="40" r="32" fill="url(#cyanNode)"/>
    
    <!-- Left Node (Electric Blue) -->
    <circle cx="35" cy="115" r="32" fill="url(#blueNode)"/>
    
    <!-- Right Node (Electric Blue) -->
    <circle cx="135" cy="115" r="32" fill="url(#blueNode)"/>
    
    <!-- Bottom Node (Purple) -->
    <circle cx="80" cy="185" r="32" fill="url(#purpleNode)"/>
  </g>

  <!-- Text "KaizenQ" -->
  <g font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700">
    <text x="210" y="150" font-size="110" fill="currentColor" letter-spacing="-2">Kaizen</text>
    <text x="545" y="150" font-size="110" fill="#0072FF" letter-spacing="-2">Q</text>
  </g>
</svg>
