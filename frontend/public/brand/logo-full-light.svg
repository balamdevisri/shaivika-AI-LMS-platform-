<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;display=swap');
      .text-kaizen-light {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 78px;
        fill: #0B1220;
        letter-spacing: -0.02em;
      }
      .text-q-light {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 800;
        font-size: 78px;
        fill: url(#kqGradientFull);
        letter-spacing: -0.02em;
      }
      .text-tagline-light {
        font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 15px;
        fill: #1E293B;
        letter-spacing: 0.38em;
        text-transform: uppercase;
      }
    </style>

    <linearGradient id="kqGradientFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="40%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>

    <linearGradient id="kqArrowGradFull" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <!-- Transparent Background (No White BG) -->

  <g transform="translate(10, 0)">
    <!-- SYMBOL (LEFT) -->
    <g transform="translate(10, 0)">
      <!-- Left AI Circuit Traces -->
      <line x1="12" y1="72" x2="48" y2="72" stroke="url(#kqGradientFull)" stroke-width="3" stroke-linecap="round" />
      <circle cx="12" cy="72" r="4.5" fill="none" stroke="url(#kqGradientFull)" stroke-width="3" />
      <polygon points="46,68 56,72 46,76" fill="url(#kqGradientFull)" />

      <line x1="2" y1="100" x2="44" y2="100" stroke="url(#kqGradientFull)" stroke-width="3" stroke-linecap="round" />
      <circle cx="2" cy="100" r="4.5" fill="none" stroke="url(#kqGradientFull)" stroke-width="3" />
      <polygon points="42,96 52,100 42,104" fill="url(#kqGradientFull)" />

      <line x1="18" y1="128" x2="48" y2="128" stroke="url(#kqGradientFull)" stroke-width="3" stroke-linecap="round" />
      <circle cx="18" cy="128" r="4.5" fill="none" stroke="url(#kqGradientFull)" stroke-width="3" />
      <polygon points="46,124 56,128 46,132" fill="url(#kqGradientFull)" />

      <!-- Q Circle -->
      <circle cx="110" cy="100" r="66" fill="none" stroke="url(#kqGradientFull)" stroke-width="16" stroke-linecap="round" />

      <!-- K Stem & Arms -->
      <line x1="80" y1="56" x2="80" y2="144" stroke="url(#kqGradientFull)" stroke-width="15" stroke-linecap="round" />
      <path d="M 80 100 L 136 54" fill="none" stroke="url(#kqGradientFull)" stroke-width="15" stroke-linecap="round" />
      <path d="M 80 100 L 148 144 L 172 168" fill="none" stroke="url(#kqGradientFull)" stroke-width="15" stroke-linecap="round" />

      <!-- Internal Growth Arrow -->
      <g transform="translate(120, 88)">
        <path d="M 0 16 L 0 0 M -6 6 L 0 -1 L 6 6" fill="none" stroke="url(#kqArrowGradFull)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>

    <!-- WORDMARK & TAGLINE (RIGHT) -->
    <g transform="translate(225, 110)">
      <text class="text-kaizen-light" x="0" y="0">Kaizen</text>
      <text class="text-q-light" x="290" y="0">Q</text>
      
      <!-- Tagline: — LEARN • BUILD • EVOLVE — -->
      <g transform="translate(0, 36)">
        <line x1="0" y1="-5" x2="48" y2="-5" stroke="url(#kqGradientFull)" stroke-width="2" stroke-linecap="round" />
        
        <text class="text-tagline-light" x="64" y="0">
          LEARN <tspan fill="#2563EB">•</tspan> BUILD <tspan fill="#22D3EE">•</tspan> EVOLVE
        </text>

        <line x1="435" y1="-5" x2="480" y2="-5" stroke="url(#kqGradientFull)" stroke-width="2" stroke-linecap="round" />
      </g>
    </g>
  </g>
</svg>
