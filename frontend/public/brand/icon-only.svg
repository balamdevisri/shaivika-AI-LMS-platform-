<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="100%" height="100%">
  <defs>
    <!-- Royal Blue to Electric Cyan Gradient -->
    <linearGradient id="kqGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="40%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>

    <!-- Upward Arrow Gradient -->
    <linearGradient id="kqArrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Subtle Soft Glow -->
    <filter id="kqGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(15, 0)" filter="url(#kqGlow)">
    <!-- 1. LEFT AI CIRCUIT BRANCHES -->
    <!-- Top Branch -->
    <line x1="12" y1="72" x2="48" y2="72" stroke="url(#kqGradient)" stroke-width="3" stroke-linecap="round" />
    <circle cx="12" cy="72" r="4.5" fill="none" stroke="url(#kqGradient)" stroke-width="3" />
    <polygon points="46,68 56,72 46,76" fill="url(#kqGradient)" />

    <!-- Middle Branch -->
    <line x1="2" y1="100" x2="44" y2="100" stroke="url(#kqGradient)" stroke-width="3" stroke-linecap="round" />
    <circle cx="2" cy="100" r="4.5" fill="none" stroke="url(#kqGradient)" stroke-width="3" />
    <polygon points="42,96 52,100 42,104" fill="url(#kqGradient)" />

    <!-- Bottom Branch -->
    <line x1="18" y1="128" x2="48" y2="128" stroke="url(#kqGradient)" stroke-width="3" stroke-linecap="round" />
    <circle cx="18" cy="128" r="4.5" fill="none" stroke="url(#kqGradient)" stroke-width="3" />
    <polygon points="46,124 56,128 46,132" fill="url(#kqGradient)" />

    <!-- 2. CIRCULAR Q OUTER RING -->
    <circle cx="110" cy="100" r="66" fill="none" stroke="url(#kqGradient)" stroke-width="16" stroke-linecap="round" />

    <!-- 3. GEOMETRIC K VERTICAL STEM & DIAGONAL ARMS -->
    <line x1="80" y1="56" x2="80" y2="144" stroke="url(#kqGradient)" stroke-width="15" stroke-linecap="round" />
    <path d="M 80 100 L 136 54" fill="none" stroke="url(#kqGradient)" stroke-width="15" stroke-linecap="round" />
    <path d="M 80 100 L 148 144 L 172 168" fill="none" stroke="url(#kqGradient)" stroke-width="15" stroke-linecap="round" />

    <!-- 4. INTERNAL UPWARD GROWTH ARROW (Hidden inside right aperture) -->
    <g transform="translate(120, 88)">
      <path d="M 0 16 L 0 0 M -6 6 L 0 -1 L 6 6" fill="none" stroke="url(#kqArrowGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
